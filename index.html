<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculateur de marge et bénéfice</title>

  <!-- Favicon classique -->
  <link rel="icon" href="favicon.png" type="image/png">

  <!-- Icône pour iPhone / écran d’accueil -->
  <link rel="apple-touch-icon" href="favicon.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    .field-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      color: #e74c3c;
    }
    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      background-color: #3498db;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <h1>Calculateur de marge et bénéfice</h1>

  <div class="field-group">
    <label for="prixAchat">Prix d'achat net (€)</label>
    <input type="number" id="prixAchat" placeholder="Entrez le prix d'achat">
  </div>

  <div class="field-group">
    <label for="pourcentage">Pourcentage / Coefficient</label>
    <input type="number" id="pourcentage" placeholder="Entrez % ou coefficient">
  </div>

  <div class="field-group">
    <label for="prixVente">Prix de vente (€)</label>
    <input type="number" id="prixVente" placeholder="Sera calculé automatiquement">
  </div>

  <div class="field-group">
    <label for="benefice">Bénéfice net (€)</label>
    <input type="number" id="benefice" placeholder="Sera calculé automatiquement">
  </div>

  <button id="calculer">Calculer</button>

  <div id="result"></div>

  <script>
    const prixAchat = document.getElementById('prixAchat');
    const pourcentage = document.getElementById('pourcentage');
    const prixVente = document.getElementById('prixVente');
    const benefice = document.getElementById('benefice');
    const result = document.getElementById('result');
    const btn = document.getElementById('calculer');

    btn.addEventListener('click', () => {
      const achat = parseFloat(prixAchat.value);
      const pourc = parseFloat(pourcentage.value);
      const vente = parseFloat(prixVente.value);
      const benef = parseFloat(benefice.value);

      let computedVente, computedBenefice, computedPourc;

      // Cas 1 : prix d'achat + pourcentage donné
      if(!isNaN(achat) && !isNaN(pourc)) {
        computedVente = achat * (1 + pourc / 100);
        computedBenefice = computedVente - achat;
      }
      // Cas 2 : prix d'achat + bénéfice donné
      else if(!isNaN(achat) && !isNaN(benef)) {
        computedVente = achat + benef;
        computedBenefice = benef;
        computedPourc = ((computedVente / achat) - 1) * 100;
      }
      // Cas 3 : prix de vente + prix d'achat
      else if(!isNaN(achat) && !isNaN(vente)) {
        computedVente = vente;
        computedBenefice = computedVente - achat;
        computedPourc = ((computedVente / achat) - 1) * 100;
      }

      prixVente.value = computedVente ? computedVente.toFixed(2) : '';
      benefice.value = computedBenefice ? computedBenefice.toFixed(2) : '';
      if(computedPourc) pourcentage.value = computedPourc.toFixed(2);

      result.textContent = computedBenefice ? `Bénéfice net : ${computedBenefice.toFixed(2)} €` : '';
    });
  </script>
</body>
</html>
