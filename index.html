<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculateur de marge et bénéfice</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="favicon.png">

  <style>
    /* Corps de la page */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      color: #2c3e50;
      background: linear-gradient(to bottom, #ffe6b3, #ffcccc);
      overflow-x: hidden;
      position: relative;
    }

    /* Animation billets */
    .billet {
      position: absolute;
      top: -50px;
      font-size: 20px;
      color: #27ae60;
      user-select: none;
      pointer-events: none;
      opacity: 0.8;
      animation-name: tomber;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes tomber {
      0% { transform: translateY(-50px) rotate(0deg); }
      100% { transform: translateY(110vh) rotate(360deg); }
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 28px;
    }

    .field-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 16px;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
      border: 2px solid #3498db;
      border-radius: 6px;
      background-color: #ffffff;
      color: #2c3e50;
      text-align: left;
      transition: border-color 0.3s, background-color 0.3s;
    }

    input:focus {
      border-color: #2980b9;
      background-color: #eaf2fb;
      outline: none;
    }

    .taux-container {
      display: flex;
      flex-direction: column;
      border: 2px solid #3498db;
      border-radius: 6px;
      padding: 8px;
      background-color: #d0f0fd;
    }

    .taux-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .taux-row input {
      width: 100%;
      padding: 8px;
      font-size: 16px;
      border: 2px solid #3498db;
      border-radius: 4px;
      background-color: #ffffff;
      color: #2c3e50;
      text-align: left;
    }

    .taux-row span {
      font-weight: bold;
      min-width: 40px;
      text-align: center;
      font-size: 16px;
    }

    .taux-ou {
      text-align: center;
      font-weight: bold;
      color: #555;
      font-size: 16px;
      margin: 4px 0;
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      color: #e74c3c;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background-color: #3498db;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      border-radius: 6px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #2980b9;
    }

    #reset {
      background-color: #e0e0e0;
      color: #333;
    }

    #reset:hover {
      background-color: #cfcfcf;
    }
  </style>
</head>
<body>
  <h1>Calculateur de marge et bénéfice</h1>

  <div class="field-group">
    <label for="prixAchat">Prix d'achat net (€)</label>
    <input type="number" step="any" id="prixAchat" placeholder="Entrez le prix d'achat">
  </div>

  <div class="field-group">
    <label>Taux applicable</label>
    <div class="taux-container">
      <div class="taux-row">
        <input type="number" step="any" id="pourcentage" placeholder="%">
        <span>%</span>
      </div>
      <div class="taux-ou">OU</div>
      <div class="taux-row">
        <input type="number" step="any" id="coefficient" placeholder="Coefficient">
        <span>Coef</span>
      </div>
    </div>
  </div>

  <div class="field-group">
    <label for="prixVente">Prix de vente (€)</label>
    <input type="number" step="any" id="prixVente" placeholder="Entrez ou sera calculé automatiquement">
  </div>

  <div class="field-group">
    <label for="benefice">Bénéfice net (€)</label>
    <input type="number" step="any" id="benefice" placeholder="Entrez ou sera calculé automatiquement">
  </div>

  <button id="calculer">Calculer</button>
  <button id="reset">Remise à zéro</button>

  <div id="result"></div>

  <script>
    // Génération des billets animés
    const nbBillets = 20;
    for(let i=0; i<nbBillets; i++){
      const span = document.createElement('div');
      span.className = 'billet';
      span.style.left = Math.random() * 100 + 'vw';
      span.style.fontSize = 16 + Math.random() * 24 + 'px';
      span.style.animationDuration = 5 + Math.random() * 5 + 's';
      span.textContent = '💵';
      document.body.appendChild(span);
    }

    const prixAchat = document.getElementById('prixAchat');
    const pourcentage = document.getElementById('pourcentage');
    const coefficient = document.getElementById('coefficient');
    const prixVente = document.getElementById('prixVente');
    const benefice = document.getElementById('benefice');
    const result = document.getElementById('result');
    const btn = document.getElementById('calculer');
    const resetBtn = document.getElementById('reset');

    const parseNumber = (val) => {
      if (!val) return NaN;
      return parseFloat(val.toString().replace(',', '.'));
    };

    window.addEventListener('load', () => {
      if(localStorage.getItem('prixAchat')) prixAchat.value = localStorage.getItem('prixAchat');
      if(localStorage.getItem('pourcentage')) pourcentage.value = localStorage.getItem('pourcentage');
      if(localStorage.getItem('coefficient')) coefficient.value = localStorage.getItem('coefficient');
      if(localStorage.getItem('prixVente')) prixVente.value = localStorage.getItem('prixVente');
      if(localStorage.getItem('benefice')) benefice.value = localStorage.getItem('benefice');
      if(localStorage.getItem('result')) result.textContent = localStorage.getItem('result');
    });

    const syncTaux = (source) => {
      const achat = parseNumber(prixAchat.value);
      if (!achat) return;

      if (source === 'pourcentage') {
        const val = parseNumber(pourcentage.value);
        if (!isNaN(val)) {
          coefficient.value = (1 + val / 100).toFixed(3);
        } else coefficient.value = '';
      } else if (source === 'coefficient') {
        const val = parseNumber(coefficient.value);
        if (!isNaN(val)) {
          pourcentage.value = ((val - 1) * 100).toFixed(2);
        } else pourcentage.value = '';
      }
    };

    pourcentage.addEventListener('input', () => syncTaux('pourcentage'));
    coefficient.addEventListener('input', () => syncTaux('coefficient'));

    const calculate = () => {
      let achat = parseNumber(prixAchat.value);
      let pourc = parseNumber(pourcentage.value);
      let coef = parseNumber(coefficient.value);
      let vente = parseNumber(prixVente.value);
      let benef = parseNumber(benefice.value);

      let computedAchat = achat;
      let computedVente, computedBenef, computedCoef, computedPourc;

      if(!isNaN(achat) && (!isNaN(pourc) || !isNaN(coef))) {
        const c = !isNaN(coef) ? coef : 1 + pourc / 100;
        computedVente = achat * c;
        computedBenef = computedVente - achat;
        computedCoef = c;
        computedPourc = (c - 1) * 100;
      } else if(!isNaN(achat) && !isNaN(benef)) {
        computedVente = achat + benef;
        computedBenef = benef;
        computedCoef = computedVente / achat;
        computedPourc = (computedCoef - 1) * 100;
      } else if(!isNaN(achat) && !isNaN(vente)) {
        computedVente = vente;
        computedBenef = computedVente - achat;
        computedCoef = computedVente / achat;
        computedPourc = (computedCoef - 1) * 100;
      } else if(!isNaN(vente) && (!isNaN(pourc) || !isNaN(coef))) {
        const c = !isNaN(coef) ? coef : 1 + pourc / 100;
        computedAchat = vente / c;
        computedVente = vente;
        computedBenef = computedVente - computedAchat;
        computedCoef = c;
        computedPourc = (c - 1) * 100;
      } else if(!isNaN(vente) && !isNaN(benef)) {
        computedAchat = vente - benef;
        computedVente = vente;
        computedBenef = benef;
        computedCoef = computedVente / computedAchat;
        computedPourc = (computedCoef - 1) * 100;
      } else if(!isNaN(benef) && (!isNaN(pourc) || !isNaN(coef))) {
        const c = !isNaN(coef) ? coef : 1 + pourc / 100;
        computedAchat = benef / (c - 1);
        computedVente = computedAchat * c;
        computedBenef = benef;
        computedCoef = c;
        computedPourc = (c - 1) * 100;
      }

      prixAchat.value = computedAchat ? computedAchat.toFixed(2) : '';
      prixVente.value = computedVente ? computedVente.toFixed(2) : '';
      benefice.value = computedBenef ? computedBenef.toFixed(2) : '';
      coefficient.value = computedCoef ? computedCoef.toFixed(3) : '';
      pourcentage.value = computedPourc ? computedPourc.toFixed(2) : '';
      result.textContent = computedBenef ? `Bénéfice net : ${computedBenef.toFixed(2)} €` : '';

      localStorage.setItem('prixAchat', prixAchat.value);
      localStorage.setItem('prixVente', prixVente.value);
      localStorage.setItem('benefice', benefice.value);
      localStorage.setItem('pourcentage', pourcentage.value);
      localStorage.setItem('coefficient', coefficient.value);
      localStorage.setItem('result', result.textContent);
    };

    btn.addEventListener('click', calculate);

    resetBtn.addEventListener('click', () => {
      prixAchat.value = '';
      pourcentage.value = '';
      coefficient.value = '';
      prixVente.value = '';
      benefice.value = '';
      result.textContent = '';
      localStorage.clear();
    });
  </script>
</body>
</html>
